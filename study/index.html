<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>study</title>
    <!-- Apply the saved theme before first paint so an explicit light/dark choice
         never flashes the opposite scheme. "system" leaves the attribute off and
         lets prefers-color-scheme (styles.css) decide. Mirrors src/theme.ts. -->
    <script>
      try {
        var t = localStorage.getItem("study.theme");
        if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
